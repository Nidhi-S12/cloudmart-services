services:

  # -------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       cloudmart
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — no Zookeeper needed
      KAFKA_CFG_NODE_ID:                        1
      KAFKA_CFG_PROCESS_ROLES:                  broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS:       1@kafka:9093
      KAFKA_CFG_LISTENERS:                      PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS:           PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES:      CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE:      "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s  # Kafka takes a moment to start

  # -------------------------------------------------------
  # Backend Services
  # -------------------------------------------------------

  product-service:
    build:
      context: ./product-service
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cloudmart
    depends_on:
      postgres:
        condition: service_healthy  # wait until postgres is actually ready
    restart: on-failure

  order-service:
    build:
      context: ./order-service
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: docker/Dockerfile
    ports:
      - "4000:3000"  # exposed on 4000 so frontend dev server can use 3000
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
      ORDER_SERVICE_URL:   http://order-service:3001
    depends_on:
      - product-service
      - order-service
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
